<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (!localStorage.getItem("focusly-user")) {
        window.location.replace("index.html");
      }
    </script>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style/dashboard.css" />
    <link rel="stylesheet" href="style/modal.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="open menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <div class="nav-backdrop" id="navBackdrop"></div>

    <div class="side-nav">
      <p class="logo"><i class="fa-solid fa-bullseye"></i> Focusly</p>
      <ul>
        <li>
          <a href="dashboard.html" class="active"
            ><i class="fa-solid fa-border-all"></i> DashBoard</a
          >
        </li>
        <li>
          <a href="tasks.html"
            ><i class="fa-regular fa-square-check"></i> My Tasks</a
          >
        </li>
        <li>
          <a href="goals.html"><i class="fa-solid fa-bullseye"></i> My Goals</a>
        </li>
        <li>
          <a href="focus.html"><i class="fa-solid fa-stopwatch"></i> Focus</a>
        </li>
        <li>
          <a href="settings.html"><i class="fa-solid fa-gears"></i> Settings</a>
        </li>
      </ul>
    </div>

    <main class="main">
      <div class="dashboard-content">
        <div class="dashboard-top-row">
          <div class="welcome">
            <!-- greeting text left as-is, per Misan's own setup -->
            <p class="welcome-msg js-welcome-message"></p>
            <p class="current-date js-current-date"></p>
          </div>

          <div class="dashboard-search-wrap">
            <i class="fa-solid fa-magnifying-glass dashboard-search-icon"></i>
            <input
              type="text"
              class="dashboard-search-input js-dashboard-search"
              placeholder="Search anything..."
              autocomplete="off"
            />
            <div
              class="dashboard-search-results js-dashboard-search-results"
            ></div>
          </div>
        </div>

        <div class="reminder-cards">
          <div class="stat-card due-day">
            <div class="stat-icon"><i class="fa-regular fa-clock"></i></div>
            <div>
              <h3 class="amount js-due-today-count">0</h3>
              <p>Due Today</p>
            </div>
          </div>

          <div class="stat-card overdue">
            <div class="stat-icon">
              <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div>
              <h3 class="amount js-overdue-count">0</h3>
              <p>Overdue</p>
            </div>
          </div>

          <div class="stat-card goals-in-progress">
            <div class="stat-icon">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
            <div>
              <h3 class="amount js-goals-count">0</h3>
              <p>Goals In Progress</p>
            </div>
          </div>

          <div class="stat-card week-completion">
            <div class="stat-icon">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div>
              <h3 class="amount js-completed-count">0</h3>
              <p>Completed This Week</p>
            </div>
          </div>

          <div class="stat-card focus-time">
            <div class="stat-icon"><i class="fa-solid fa-fire"></i></div>
            <div>
              <h3 class="amount js-focus-time">0m</h3>
              <p>Focused This Week</p>
            </div>
          </div>
        </div>

        <div class="dashboard-tasks">
          <section>
            <div class="section-header">
              <span class="status-dot task-dot"></span>
              <h4>Short-Term Tasks</h4>
              <span class="dashboard-count-badge js-task-snippet-count"></span>
            </div>
            <div class="dashboard-snippet-list js-dashboard-task-list"></div>
          </section>

          <section>
            <div class="section-header">
              <span class="status-dot goal-dot"></span>
              <h4>Long-Term Goals</h4>
              <span class="dashboard-count-badge js-goal-snippet-count"></span>
            </div>
            <div class="dashboard-snippet-list js-dashboard-goal-list"></div>
          </section>
        </div>
      </div>

      <button class="plus-btn js-open-modal">+</button>

      <div class="modal js-modal">
        <div class="modal-content">
          <span class="close-modal js-close-modal">&times;</span>
          <h2>New Item</h2>

          <form>
            <div class="form-group">
              <label>What are you creating?</label>
              <div class="type-btn-group">
                <label class="type-btn-label">
                  <input
                    type="radio"
                    id="type-task"
                    name="item-type"
                    class="js-type-task"
                    value="task"
                    checked
                  />
                  <span>Task (short-term)</span>
                </label>
                <label class="type-btn-label">
                  <input
                    type="radio"
                    id="type-goal"
                    name="item-type"
                    class="js-type-goal"
                    value="goal"
                  />
                  <span>Goal (long-term)</span>
                </label>
              </div>
            </div>

            <div class="form-group">
              <label>Title</label>
              <input
                type="text"
                name="title"
                class="js-title"
                placeholder="What do you want to acccomplish?"
              />
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea
                name="description"
                class="js-description"
                placeholder="Add detais, context or notes..."
              ></textarea>
            </div>

            <div class="form-group">
              <label>Due Date &amp; Time</label>
              <div class="due-date-time-row">
                <div class="input-icon-wrap">
                  <i class="fa-regular fa-calendar"></i>
                  <input
                    type="date"
                    name="due"
                    class="js-date"
                    placeholder="Select a date"
                  />
                </div>
                <div
                  class="input-icon-wrap time-input-wrap js-task-only-fields"
                >
                  <i class="fa-regular fa-clock"></i>
                  <input type="time" name="due-time" class="js-time" />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Priority</label>
              <div class="priority-btn-group">
                <button
                  type="button"
                  class="priority-btn js-priority-btn"
                  data-priority="high"
                >
                  High
                </button>
                <button
                  type="button"
                  class="priority-btn js-priority-btn"
                  data-priority="medium"
                >
                  Medium
                </button>
                <button
                  type="button"
                  class="priority-btn js-priority-btn"
                  data-priority="low"
                >
                  Low
                </button>
              </div>
            </div>

            <div class="form-group">
              <label>Category</label>
              <select name="category" class="js-task-category">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="finance">Finance</option>
                <option value="learning">Learning</option>
                <option value="create-option">+ Create custom...</option>
              </select>
            </div>

            <div class="js-goal-only-fields form-group" style="display: none">
              <label>Milestones</label>
              <div class="milestone-list js-milestone-list"></div>
              <button type="button" class="add-milestone-btn js-add-milestone">
                Milestone(s) +
              </button>
            </div>

            <div class="modal-footer">
              <button type="button" class="cancel-btn js-cancel-modal">
                Cancel
              </button>
              <button type="button" class="create-btn js-create-task">
                Create Item
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="script/modal.js"></script>
    <script src="script/dashboard.js"></script>
    <script src="script/toggle-nav.js"></script>
  </body>
</html>
